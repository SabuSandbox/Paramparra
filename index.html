<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parampara | Countdown Capsule Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF8F5; color: #2D2A26; overflow-x: hidden; }
        .serif-title { font-family: 'Marcellus', serif; }
        [x-cloak] { display: none !important; }

        /* Drum rotation keyframe animations */
        @keyframes drum-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(1080deg); }
        }
        .spinning-drum {
            animation: drum-spin 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Confetti piece styling */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: confetti-fall 1.5s ease-out forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(120px) translateX(var(--x-move)) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8 min-h-screen flex flex-col justify-between" x-data="countdownApp()">

    <div class="relative w-full rounded-[2.5rem] border border-[#6B1824] overflow-hidden bg-[#4A0E17] shadow-xl min-h-[16vh] flex items-center p-4 md:p-6">
        <div class="relative z-10 grid grid-cols-2 md:grid-cols-3 items-center w-full max-w-7xl mx-auto px-2">
            
            <div class="hidden md:flex items-center justify-start">
                <div class="block opacity-80">
                    <img src="Logosymbbg.png" alt="Parampara Symbol" class="h-24 sm:h-28 w-auto object-contain">
                </div>
            </div>

            <div class="flex justify-start md:justify-center col-span-2 md:col-span-1">
                <img src="Logotextbg.png" alt="Parampara - An Inheritance of Style" class="w-full max-w-xs sm:max-w-sm md:max-w-md h-auto object-contain">
            </div>

            <div class="hidden md:flex items-center justify-end text-white/40 text-xs uppercase tracking-widest font-semibold px-6">
                <span class="border border-white/20 rounded-full px-4 py-1.5 backdrop-blur-xs">Premium Vault</span>
            </div>
        </div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-center max-w-4xl mx-auto w-full px-4 text-center my-12">
        
        <div class="w-16 h-16 bg-[#F4EFEA] text-[#9E7356] rounded-full flex items-center justify-center mb-6 shadow-xs border border-[#EAE4DC]">
            <i class="fa-solid fa-wand-magic-sparkles text-2xl animate-pulse"></i>
        </div>

        <h1 class="serif-title text-3xl sm:text-5xl font-normal text-[#4A2312] tracking-wide leading-tight mb-2">
            The Birthday Vault is Locked
        </h1>
        
        <p class="text-xs text-[#8C847C] uppercase tracking-[0.25em] font-bold max-w-md mx-auto mb-8">
            Wait till birthday for this
        </p>

        <div class="bg-white border border-[#EAE4DC] shadow-xl rounded-3xl p-6 mb-12 max-w-sm w-full inline-block">
            <div class="serif-title text-5xl font-bold text-[#4A0E17] tracking-tight">
                05
            </div>
            <div class="text-[10px] font-bold uppercase tracking-[0.3em] text-[#9E7356] mt-2">
                Days To Go
            </div>
        </div>

        <div class="bg-white border border-[#EAE4DC] shadow-2xl rounded-[2rem] p-6 max-w-md w-full relative overflow-hidden flex flex-col items-center">
            
            <div class="w-full h-40 bg-[#FAF8F5] border border-[#EAE4DC] rounded-2xl relative overflow-hidden flex items-center justify-center mb-6 shadow-inner">
                
                <div :class="isSpinning ? 'spinning-drum' : ''" class="w-28 h-28 border-4 border-dashed border-[#9E7356]/40 rounded-full flex items-center justify-center transition-transform">
                    <i class="fa-solid fa-circle-nodes text-4xl text-[#4A0E17]/20"></i>
                </div>
                
                <div class="absolute inset-0 pointer-events-none p-4 grid grid-cols-4 gap-4 opacity-70">
                    <div x-show="!isOpened(1)" class="w-6 h-6 bg-[#4A0E17] rounded-full shadow-md mx-auto"></div>
                    <div x-show="!isOpened(2)" class="w-6 h-6 bg-[#D4AF37] rounded-full shadow-md mx-auto"></div>
                    <div x-show="!isOpened(3)" class="w-6 h-6 bg-[#9E7356] rounded-full shadow-md mx-auto"></div>
                    <div x-show="!isOpened(4)" class="w-6 h-6 bg-[#6B1824] rounded-full shadow-md mx-auto"></div>
                </div>

                <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                    <template x-for="p in confettiParticles" :key="p.id">
                        <div class="confetti" :style="`background-color: ${p.color}; left: ${p.x}px; top: ${p.y}px; --x-move: ${p.mx}px;`"></div>
                    </template>
                </div>
            </div>

            <div class="flex flex-col items-center space-y-3">
                <button @click="dispenseCapsule()" 
                        :disabled="isSpinning || remainingBoxes.length === 0"
                        :class="isSpinning || remainingBoxes.length === 0 ? 'opacity-40 cursor-not-allowed bg-stone-300' : 'bg-[#4A0E17] hover:bg-[#6B1824] hover:scale-102'"
                        class="px-8 py-3.5 text-white rounded-xl text-[10px] uppercase font-bold tracking-widest shadow-md transition-all duration-300 flex items-center space-x-2">
                    <i class="fa-solid fa-gears" :class="isSpinning ? 'animate-spin' : ''"></i>
                    <span x-text="remainingBoxes.length === 0 ? 'All Archives Unlocked' : 'Turn Handle to Dispense'"></span>
                </button>
                <p class="text-[10px] tracking-wide text-[#8C847C] uppercase font-medium" x-text="`${remainingBoxes.length} Unopened Archives Remaining`"></p>
            </div>

        </div>

    </main>

    <div x-show="modalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#2D2A26]/50 backdrop-blur-xs" x-cloak>
        <div class="bg-white p-4 pb-6 rounded-xl shadow-2xl border border-[#EAE4DC] max-w-sm w-full transform transition-all duration-500 scale-100 rotate-1"
             @click.outside="modalOpen = false"
             x-transition:enter="transition ease-out duration-300 transform"
             x-transition:enter-start="scale-95 opacity-0 rotate-0"
             x-transition:enter-end="scale-100 opacity-100 rotate-1">
            
            <div class="w-full aspect-[4/5] bg-stone-100 border border-stone-200 rounded-lg overflow-hidden relative shadow-inner">
                <img :src="currentReveal?.img" class="w-full h-full object-cover select-none">
            </div>

            <div class="mt-4 text-center">
                <p class="serif-title text-base font-semibold text-[#4A2312] italic" x-text="currentReveal?.caption"></p>
                <button @click="modalOpen = false" class="mt-4 px-5 py-1.5 border border-[#EAE4DC] text-[9px] uppercase font-bold tracking-widest text-[#8C847C] rounded-lg hover:bg-stone-50 transition">Dismiss Archive</button>
            </div>
        </div>
    </div>

    <footer class="mt-12 py-6 border-t border-[#EAE4DC] text-center text-[10px] text-[#8C847C] uppercase tracking-[0.25em]">
        <p class="serif-title text-[#4A2312] text-xl font-normal tracking-wide normal-case mb-2">Parampara</p>
        <p class="font-light normal-case tracking-normal">&copy; 2026 Parampara Luxury Ethnic Collections. All rights reserved.</p>
    </footer>

    <script>
        function countdownApp() {
            return {
                isSpinning: false,
                modalOpen: false,
                currentReveal: null,
                confettiParticles: [],
                
                // Maps directly into your device root folder filenames
                memoryBoxes: [
                    { id: 1, img: "photo1.jpg", caption: "🕶️ Too Cool for the Catalog", isOpened: false },
                    { id: 2, img: "photo2.jpg", caption: "💬 Debate Over Outfit Rates", isOpened: false },
                    { id: 3, img: "photo3.jpg", caption: "☕ Fueling the Design Team", isOpened: false },
                    { id: 4, img: "photo4.jpg", caption: "🤳 Double checking the embroidery angles", isOpened: false },
                    { id: 5, img: "photo5.jpg", caption: "✨ Midnight lookbook lighting tests", isOpened: false }
                ],

                get remainingBoxes() {
                    return this.memoryBoxes.filter(b => !b.isOpened);
                },

                isOpened(id) {
                    const box = this.memoryBoxes.find(b => b.id === id);
                    return box ? box.isOpened : false;
                },

                dispenseCapsule() {
                    if (this.isSpinning || this.remainingBoxes.length === 0) return;
                    
                    this.isSpinning = true;
                    this.confettiParticles = [];

                    // Select a random archive capsule from the remaining list
                    const randomIndex = Math.floor(Math.random() * this.remainingBoxes.length);
                    const targetBox = this.remainingBoxes[randomIndex];

                    // Trigger smooth unboxing drum spinning timeline
                    setTimeout(() => {
                        this.isSpinning = false;
                        targetBox.isOpened = true;
                        this.currentReveal = targetBox;
                        
                        // Generate CSS Confetti Burst variables
                        this.triggerConfetti();

                        // Present Polaroid modal view sheet
                        setTimeout(() => {
                            this.modalOpen = true;
                        }, 400);

                    }, 2000);
                },

                triggerConfetti() {
                    const colors = ['#4A0E17', '#D4AF37', '#9E7356', '#FAF8F5'];
                    for (let i = 0; i < 30; i++) {
                        this.confettiParticles.push({
                            id: i,
                            color: colors[Math.floor(Math.random() * colors.length)],
                            x: 180 + (Math.random() * 40 - 20),
                            y: 70 + (Math.random() * 40 - 20),
                            mx: Math.random() * 160 - 80
                        });
                    }
                }
            }
        }
    </script>
</body>
</html>
