<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parampara - The Ethnic Wear | Premium Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="apple-touch-icon" href="Logoicon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#4A0E17">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF8F5; color: #2D2A26; overflow-x: hidden; }
        .serif-title { font-family: 'Marcellus', serif; }
        [x-cloak] { display: none !important; }
        
        .icon-btn .label-text {
            max-width: 0;
            opacity: 0;
            transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .icon-btn:hover .label-text {
            max-width: 140px;
            opacity: 1;
        }

        /* Custom sleek scrollbar for sliding panels */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #F4EFEA;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #9E7356;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8 min-h-screen flex flex-col justify-between" x-data="paramparaApp()">

    <div x-show="showPwaPopup" 
         x-transition:enter="transition ease-out duration-500 transform"
         x-transition:enter-start="translate-y-20 opacity-0"
         x-transition:enter-end="translate-y-0 opacity-100"
         x-transition:leave="transition ease-in duration-300 transform"
         x-transition:leave-start="translate-y-0 opacity-100"
         x-transition:leave-end="translate-y-20 opacity-0"
         class="fixed bottom-6 left-6 right-6 md:left-auto md:right-6 md:max-w-sm bg-white border border-[#EAE4DC] shadow-2xl rounded-2xl p-4 z-50 flex items-start space-x-4" 
         x-cloak>
        <img src="Logoicon.png" alt="Parampara App" class="w-12 h-12 rounded-xl object-cover border border-[#4A0E17]/10 flex-shrink-0">
        <div class="flex-1">
            <h4 class="serif-title text-sm font-bold text-[#4A2312]">Experience Parampara</h4>
            <p class="text-[11px] text-[#8C847C] mt-0.5 leading-relaxed">Add our Premium Atelier to your home screen for quick lookbook access.</p>
            <div class="mt-3 flex items-center space-x-3">
                <button @click="handleInstallClick()" class="bg-[#4A0E17] text-white text-[10px] uppercase font-bold tracking-widest px-4 py-2 rounded-lg hover:bg-[#6B1824] transition duration-300">Install App</button>
                <button @click="dismissPopup('later')" class="text-stone-400 hover:text-stone-600 text-[11px] font-medium tracking-wide">Later</button>
            </div>
        </div>
        <button @click="dismissPopup('close')" class="text-stone-300 hover:text-stone-500 transition"><i class="fa-solid fa-xmark text-xs"></i></button>
    </div>

    <div class="relative w-full rounded-[2.5rem] border border-[#6B1824] overflow-hidden bg-[#4A0E17] shadow-xl min-h-[16vh] flex items-center p-4 md:p-6">
        <div class="relative z-10 grid grid-cols-2 md:grid-cols-3 items-center w-full max-w-7xl mx-auto px-2">
            
            <div class="hidden md:flex items-center justify-start">
                <a href="#" class="block hover:opacity-90 transition">
                    <img src="Logosymbbg.png" alt="Parampara Symbol" class="h-24 sm:h-28 w-auto object-contain">
                </a>
            </div>

            <div class="flex justify-start md:justify-center">
                <img src="Logotextbg.png" alt="Parampara - An Inheritance of Style" class="w-full max-w-xs sm:max-w-sm md:max-w-md h-auto object-contain">
            </div>

            <div class="flex items-center justify-end space-x-4 sm:space-x-5">
                <button @click="wishlistOpen = true" class="icon-btn group relative flex items-center h-14 px-6 bg-white/10 backdrop-blur-md rounded-full border border-white/20 text-white hover:bg-white hover:text-[#4A0E17] transition-all duration-300 shadow-sm cursor-pointer">
                    <i class="fa-regular fa-heart text-2xl group-hover:scale-110 transition-transform"></i>
                    <span class="label-text block text-[11px] font-bold uppercase tracking-[0.15em] ml-2.5 text-white group-hover:text-[#4A0E17] whitespace-nowrap overflow-hidden">Wishlist</span>
                    <span x-show="wishlist.length > 0" x-text="wishlist.length" x-transition.scale
                          class="absolute -top-1 -right-1 bg-[#D4AF37] text-[#4A0E17] text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold animate-pulse"></span>
                </button>

                <button @click="cartOpen = true" class="icon-btn group relative flex items-center h-14 px-6 bg-white/10 backdrop-blur-md rounded-full border border-white/20 text-white hover:bg-white hover:text-[#4A0E17] transition-all duration-300 shadow-sm cursor-pointer">
                    <i class="fa-solid fa-bag-shopping text-2xl group-hover:scale-110 transition-transform"></i>
                    <span class="label-text block text-[11px] font-bold uppercase tracking-[0.15em] ml-2.5 text-white group-hover:text-[#4A0E17] whitespace-nowrap overflow-hidden">Bag</span>
                    <span x-show="cart.length > 0" x-text="cart.length" x-transition.scale
                          class="absolute -top-1 -right-1 bg-white text-[#4A0E17] text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold shadow"></span>
                </button>
            </div>
        </div>
    </div>

    <nav class="sticky top-4 z-40 max-w-4xl mx-auto w-full mt-8 px-4 md:px-0">
        <div class="relative bg-white/80 backdrop-blur-xl border border-[#EAE4DC] p-1.5 rounded-full shadow-lg flex items-center justify-between overflow-x-auto scrollbar-none">
            <div class="absolute top-1.5 bottom-1.5 left-1.5 bg-[#4A0E17] rounded-full transition-all duration-500 ease-[cubic-bezier(0.25,1,0.5,1)] shadow-md"
                 :style="getPillStyles()"></div>

            <template x-for="(cat, index) in groupCategories" :key="index">
                <button @click="switchCategory(cat, index)"
                        :id="'cat-btn-' + index"
                        :class="selectedCategory === cat ? 'text-white font-medium scale-102' : 'text-[#4A2312]/70 hover:text-[#4A0E17]'"
                        class="relative z-10 text-[10px] sm:text-[11px] uppercase tracking-[0.2em] px-6 sm:px-8 py-3.5 transition-all duration-300 rounded-full font-normal whitespace-nowrap flex-grow text-center"
                        x-text="cat">
                </button>
            </template>
        </div>
    </nav>

    <main id="catalog" class="max-w-7xl mx-auto w-full px-4 lg:px-8 py-16">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 pb-4 border-b border-[#EAE4DC]">
            <div>
                <h2 class="serif-title text-2xl sm:text-4xl font-normal text-[#4A2312]" x-text="selectedCategory === 'All' ? 'Our Complete Collection' : selectedCategory"></h2>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-8 gap-y-16">
            <template x-for="item in filteredItems()" :key="item.id">
                <div @click="triggerQuickView(item)" 
                     class="group relative flex flex-col justify-between bg-white p-4 rounded-2xl border border-[#EAE4DC]/60 hover:border-[#9E7356]/50 transform hover:-translate-y-1.5 shadow-xs hover:shadow-2xl transition-all duration-500 cursor-pointer" 
                     x-data="{ localActiveIndex: 0 }">
                    
                    <div class="relative aspect-[3/4] w-full overflow-hidden bg-[#F4EFEA] rounded-xl mb-3">
                        <img :src="item.images[localActiveIndex]" :alt="item.title" class="h-full w-full object-cover object-top transform group-hover:scale-105 transition-transform duration-700 ease-out">
                        
                        <div class="absolute inset-0 p-4 flex flex-col justify-between items-end z-20">
                            <button @click.stop="toggleWishlist(item)" class="bg-white/90 backdrop-blur-xs p-2.5 rounded-full shadow-md text-[#4A2312] hover:bg-[#4A0E17] hover:text-white transform hover:scale-110 transition duration-300">
                                <i :class="isWishlisted(item.id) ? 'fa-solid fa-heart text-red-500' : 'fa-regular fa-heart'"></i>
                            </button>
                        </div>
                        
                        <template x-if="item.badge">
                            <span class="absolute top-3 left-3 bg-[#9E7356] text-white text-[8px] uppercase tracking-[0.2em] px-3 py-1.5 font-bold rounded shadow-xs z-20" x-text="item.badge"></span>
                        </template>
                    </div>

                    <div class="flex items-center space-x-1.5 mb-3 overflow-x-auto py-1 relative z-20">
                        <template x-for="(photo, index) in item.images" :key="index">
                            <button @mouseenter.stop="localActiveIndex = index" 
                                    @click.stop="localActiveIndex = index"
                                    :class="localActiveIndex === index ? 'border-[#4A0E17] scale-105 ring-1 ring-[#4A0E17]/20' : 'border-[#EAE4DC]/80 opacity-70'"
                                    class="w-8 h-10 border rounded overflow-hidden transition-all duration-200 focus:outline-none bg-stone-100 flex-shrink-0">
                                <img :src="photo" class="w-full h-full object-cover object-top">
                            </button>
                        </template>
                    </div>

                    <div class="px-1 flex justify-between items-start gap-4">
                        <div>
                            <h3 class="text-xs font-semibold text-[#2D2A26] tracking-wide leading-tight group-hover:text-[#9E7356] transition-colors duration-300" x-text="item.title"></h3>
                            <p class="text-[11px] text-[#8C847C] mt-1.5 italic font-medium" x-text="item.fabricInfo"></p>
                        </div>
                        <p class="text-sm font-bold text-[#4A2312]" x-text="'₹' + item.price.toLocaleString('en-IN')"></p>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="quickViewActive" class="fixed inset-0 z-50 flex items-center justify-center p-4" x-cloak>
        <div class="fixed inset-0 bg-[#2D2A26]/40 backdrop-blur-sm" @click="quickViewActive = false"
             x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"></div>
        <div class="bg-[#FCFBF9] border border-[#EAE4DC] max-w-4xl w-full rounded-2xl relative flex flex-col md:flex-row overflow-hidden z-10 shadow-2xl" 
             @click.outside="quickViewActive = false"
             x-transition:enter="transition ease-out duration-400 transform" x-transition:enter-start="opacity-0 scale-95 translate-y-4" x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-start="opacity-100 scale-100 translate-y-0" x-transition:leave-end="opacity-0 scale-95 translate-y-4">
            
            <button @click="quickViewActive = false" class="absolute top-4 right-4 z-20 text-[#2D2A26] bg-white/80 p-2 rounded-full shadow border border-[#EAE4DC] hover:bg-[#4A0E17] hover:text-white transition-colors duration-300">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <div class="w-full md:w-1/2 p-4 bg-[#F4EFEA]/40 flex flex-col justify-between">
                <div class="aspect-[3/4] w-full overflow-hidden rounded-xl bg-white shadow-xs">
                    <img :src="focusedUnit?.images[modalActiveIndex]" class="w-full h-full object-cover object-top transition duration-300">
                </div>
                <div class="flex items-center space-x-2 mt-4 overflow-x-auto pb-1">
                    <template x-for="(photo, index) in focusedUnit?.images" :key="index">
                        <button @click="modalActiveIndex = index"
                                :class="modalActiveIndex === index ? 'ring-2 ring-[#4A0E17] scale-102 border-transparent' : 'border-[#EAE4DC] opacity-60 hover:opacity-100'"
                                class="w-14 h-20 border rounded-lg overflow-hidden bg-white transition-all flex-shrink-0">
                            <img :src="photo" class="w-full h-full object-cover object-top">
                        </button>
                    </template>
                </div>
            </div>

            <div class="w-full md:w-1/2 p-8 flex flex-col justify-between bg-white">
                <div>
                    <span class="text-[9px] uppercase tracking-[0.25em] text-[#9E7356] font-bold block mb-1" x-text="focusedUnit?.category"></span>
                    <h2 class="serif-title text-2xl text-[#4A2312] mb-2" x-text="focusedUnit?.title"></h2>
                    <p class="text-xl font-bold text-[#4A0E17] mb-4" x-text="'₹' + focusedUnit?.price.toLocaleString('en-IN')"></p>
                    <hr class="border-[#EAE4DC] my-4">
                    <p class="text-xs text-[#5C544C] mb-6 font-normal leading-relaxed tracking-wide" x-text="focusedUnit?.narrative"></p>
                </div>
                <button @click="insertIntoCart(focusedUnit, chosenSize)" class="w-full bg-[#4A0E17] text-white text-[10px] uppercase tracking-widest font-bold py-4 rounded-xl shadow hover:bg-[#6B1824] transition duration-300 transform active:scale-98">Add to Shopping Bag</button>
            </div>
        </div>
    </div>

    <div x-show="cartOpen" class="fixed inset-0 z-50 overflow-hidden" x-cloak>
        <div class="absolute inset-0 bg-[#2D2A26]/40 backdrop-blur-xs transition-opacity" 
             @click="cartOpen = false"
             x-transition:enter="ease-out duration-500" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-400" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"></div>

        <div class="fixed inset-y-0 right-0 pl-10 max-w-full flex">
            <div class="w-screen max-w-md bg-[#FCFBF9] border-l border-[#EAE4DC] flex flex-col justify-between shadow-2xl"
                 x-transition:enter="transform transition ease-out duration-500 sm:duration-700" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
                 x-transition:leave="transform transition ease-in duration-400 sm:duration-500" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full">
                
                <div class="p-6 flex-1 flex flex-col min-h-0">
                    <div class="flex items-center justify-between border-b border-[#EAE4DC] pb-4">
                        <div class="flex items-baseline space-x-2">
                            <h3 class="serif-title text-2xl text-[#4A2312]">Shopping Bag</h3>
                            <span class="text-xs text-[#8C847C]" x-text="'(' + cart.length + (cart.length === 1 ? ' item' : ' items') + ')'"></span>
                        </div>
                        <button @click="cartOpen = false" class="text-stone-400 hover:text-[#4A0E17] p-2 rounded-full hover:bg-stone-100 transition duration-300">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </div>

                    <div class="mt-6 flex-1 overflow-y-auto custom-scrollbar pr-1">
                        <template x-if="cart.length === 0">
                            <div class="flex flex-col items-center justify-center h-64 text-center">
                                <div class="w-16 h-16 bg-[#F4EFEA] text-[#9E7356] rounded-full flex items-center justify-center mb-4">
                                    <i class="fa-solid fa-bag-shopping text-2xl"></i>
                                </div>
                                <p class="serif-title text-lg text-[#4A2312]">Your shopping bag is empty</p>
                                <p class="text-xs text-[#8C847C] mt-1 max-w-[240px]">Explore the portfolio loop to build your bespoke heritage collection.</p>
                            </div>
                        </template>

                        <div class="divide-y divide-[#F4EFEA]">
                            <template x-for="(bagItem, index) in cart" :key="index">
                                <div class="flex py-4 group" x-transition:leave="transition ease-in duration-300 transform opacity-0 -translate-x-4">
                                    <div class="flex-shrink-0 w-16 h-20 border border-[#EAE4DC]/60 rounded-lg overflow-hidden bg-[#F4EFEA]">
                                        <img :src="bagItem.image" class="w-full h-full object-cover object-top">
                                    </div>
                                    <div class="ml-4 flex-1 flex flex-col justify-between">
                                        <div>
                                            <div class="flex justify-between text-xs font-semibold text-[#2D2A26] leading-tight">
                                                <h4 x-text="bagItem.title" class="line-clamp-1"></h4>
                                                <p class="ml-4 text-[#4A2312] font-bold" x-text="'₹' + bagItem.price.toLocaleString('en-IN')"></p>
                                            </div>
                                            <p class="mt-1 text-[10px] text-[#8C847C] font-medium uppercase tracking-wider" x-text="'Size: ' + bagItem.size"></p>
                                        </div>
                                        <div class="flex items-center justify-between text-[11px]">
                                            <span class="text-stone-400 text-[10px]">Ready to ship</span>
                                            <button @click="removeLineItem(index)" class="text-red-600 font-bold hover:text-red-800 underline underline-offset-4 transition duration-200">Remove</button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div x-show="cart.length > 0" class="border-t border-[#EAE4DC] bg-white p-6 shadow-[0_-8px_30px_rgb(0,0,0,0.02)]">
                    <div class="flex justify-between text-base font-semibold text-[#2D2A26] mb-4">
                        <span class="serif-title font-normal text-[#4A2312] text-lg">Subtotal</span>
                        <span class="font-bold text-[#4A0E17]" x-text="'₹' + totalCalculation().toLocaleString('en-IN')"></span>
                    </div>
                    <p class="text-[11px] text-[#8C847C] mb-6 leading-normal normal-case italic font-medium">Taxes and premium shipping logistics curated dynamically at fulfillment.</p>
                    <button @click="checkoutBulkWhatsApp()" class="w-full bg-[#4A0E17] text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest shadow hover:bg-[#6B1824] transition duration-300 transform active:scale-98 flex items-center justify-center space-x-2">
                        <i class="fa-brands fa-whatsapp text-lg"></i>
                        <span>Send Order to WhatsApp</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div x-show="wishlistOpen" class="fixed inset-0 z-50 overflow-hidden" x-cloak>
        <div class="absolute inset-0 bg-[#2D2A26]/40 backdrop-blur-xs transition-opacity" 
             @click="wishlistOpen = false"
             x-transition:enter="ease-out duration-500" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-400" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"></div>

        <div class="fixed inset-y-0 right-0 pl-10 max-w-full flex">
            <div class="w-screen max-w-md bg-[#FCFBF9] border-l border-[#EAE4DC] flex flex-col justify-between shadow-2xl"
                 x-transition:enter="transform transition ease-out duration-500 sm:duration-700" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
                 x-transition:leave="transform transition ease-in duration-400 sm:duration-500" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full">
                
                <div class="p-6 flex-1 flex flex-col min-h-0">
                    <div class="flex items-center justify-between border-b border-[#EAE4DC] pb-4">
                        <div class="flex items-baseline space-x-2">
                            <h3 class="serif-title text-2xl text-[#4A2312]">Your Wishlist</h3>
                            <span class="text-xs text-[#8C847C]" x-text="'(' + wishlist.length + (wishlist.length === 1 ? ' item' : ' items') + ')'"></span>
                        </div>
                        <button @click="wishlistOpen = false" class="text-stone-400 hover:text-[#4A0E17] p-2 rounded-full hover:bg-stone-100 transition duration-300">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </div>

                    <div class="mt-6 flex-1 overflow-y-auto custom-scrollbar pr-1">
                        <template x-if="wishlist.length === 0">
                            <div class="flex flex-col items-center justify-center h-64 text-center">
                                <div class="w-16 h-16 bg-[#F4EFEA] text-[#9E7356] rounded-full flex items-center justify-center mb-4">
                                    <i class="fa-regular fa-heart text-2xl"></i>
                                </div>
                                <p class="serif-title text-lg text-[#4A2312]">Your wishlist is pristine</p>
                                <p class="text-xs text-[#8C847C] mt-1 max-w-[240px]">Save your favorite artisanal pieces here while designing your ensemble lookbook.</p>
                            </div>
                        </template>

                        <div class="divide-y divide-[#F4EFEA]">
                            <template x-for="wItem in wishlist" :key="wItem.id">
                                <div class="flex py-4 items-center justify-between group" x-transition:leave="transition ease-in duration-300 transform opacity-0 -translate-x-4">
                                    <div class="flex items-center space-x-4 flex-1 min-w-0">
                                        <div class="flex-shrink-0 w-12 h-16 border border-[#EAE4DC]/60 rounded-md overflow-hidden bg-[#F4EFEA]">
                                            <img :src="wItem.images[0]" class="w-full h-full object-cover object-top">
                                        </div>
                                        <div class="truncate flex-1">
                                            <h4 class="text-xs font-semibold text-[#2D2A26] truncate" x-text="wItem.title"></h4>
                                            <p class="text-xs font-bold text-[#4A2312] mt-0.5" x-text="'₹' + wItem.price.toLocaleString('en-IN')"></p>
                                        </div>
                                    </div>
                                    <div class="flex items-center space-x-3 ml-4">
                                        <button @click="wishlistOpen = false; triggerQuickView(wItem)" class="text-[10px] uppercase font-bold tracking-wider bg-[#4A0E17] text-white px-3 py-2 rounded-md hover:bg-[#6B1824] transition">View</button>
                                        <button @click="toggleWishlist(wItem)" class="text-stone-400 hover:text-red-600 p-2 rounded-full hover:bg-stone-100 transition duration-200">
                                            <i class="fa-regular fa-trash-can text-sm"></i>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-24 py-10 border-t border-[#EAE4DC] text-center text-[10px] text-[#8C847C] uppercase tracking-[0.25em]">
        <p class="serif-title text-[#4A2312] lowercase text-xl font-normal tracking-wide normal-case mb-2">Parampara</p>
        <p class="font-light normal-case tracking-normal">&copy; 2026 Parampara Luxury Ethnic Collections. All rights reserved.</p>
    </footer>

    <script>
        function paramparaApp() {
            return {
                mobileMenu: false,
                cartOpen: false,
                wishlistOpen: false,
                quickViewActive: false,
                selectedCategory: 'All',
                activeIndex: 0,
                chosenSize: 'M',
                focusedUnit: null,
                modalActiveIndex: 0,
                pillWidth: 0,
                pillLeft: 0,
                
                // PWA States
                showPwaPopup: false,
                deferredPrompt: null,
                
                groupCategories: ['All', 'Kurtis & Suits', 'Festive Wear', 'Co-ords', 'Fusion & Prints'],
                cart: [],
                wishlist: [],
                
                catalogData: [
                    { 
                        id: 1, 
                        title: "Scarlet Hearts Handloom Slub Set", 
                        category: "Kurtis & Suits", 
                        price: 1899,

                init() {
                    this.$nextTick(() => { this.updatePillPosition(0); });

                    // 1. Listen for browser engine PWA compatibility framework
                    window.addEventListener('beforeinstallprompt', (e) => {
                        e.preventDefault();
                        this.deferredPrompt = e;
                    });

                    // 2. Automated Trigger: Show custom modal 3 seconds after page loading
                    setTimeout(() => {
                        const isDismissed = localStorage.getItem('parampara_pwa_dismissed');
                        if (!isDismissed) {
                            this.showPwaPopup = true;
                        }
                    }, 3000);

                    window.addEventListener('appinstalled', () => {
                        this.showPwaPopup = false;
                        this.deferredPrompt = null;
                        localStorage.setItem('parampara_pwa_dismissed', 'true');
                    });
                },
                handleInstallClick() {
                    if (this.deferredPrompt) {
                        this.deferredPrompt.prompt();
                        this.deferredPrompt.userChoice.then((choiceResult) => {
                            if (choiceResult.outcome === 'accepted') {
                                localStorage.setItem('parampara_pwa_dismissed', 'true');
                                this.showPwaPopup = false;
                            }
                            this.deferredPrompt = null;
                        });
                    } else {
                        // Intelligent dynamic help overlay based on device structure
                        const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                        if (isiOS) {
                            alert("To install Parampara App:\n1. Tap the Share button at the bottom of Safari.\n2. Scroll down and choose 'Add to Home Screen'.");
                        } else {
                            alert("To install Parampara App on your device:\nClick your browser's menu option (3 vertical dots ┇ near top/bottom right) and select 'Install app' or 'Add to Home screen'.");
                        }
                        this.dismissPopup('installed-fallback');
                    }
                },
                dismissPopup(reason) {
                    this.showPwaPopup = false;
                    if (reason === 'later' || reason === 'installed-fallback') {
                        localStorage.setItem('parampara_pwa_dismissed', 'true');
                    }
                },
                switchCategory(cat, index) {
                    this.selectedCategory = cat;
                    this.activeIndex = index;
                    this.updatePillPosition(index);
                    this.scrollToCatalog();
                },
                updatePillPosition(index) {
                    const btn = document.getElementById('cat-btn-' + index);
                    if (btn) {
                        this.pillWidth = btn.offsetWidth;
                        this.pillLeft = btn.offsetLeft;
                    }
                },
                getPillStyles() {
                    return `width: ${this.pillWidth}px; left: ${this.pillLeft}px;`;
                },
                filteredItems() {
                    return this.catalogData.filter(unit => this.selectedCategory === 'All' || unit.category === this.selectedCategory);
                },
                scrollToCatalog() {
                    document.getElementById('catalog').scrollIntoView({ behavior: 'smooth', block: 'start' });
                },
                triggerQuickView(unit) {
                    this.focusedUnit = unit;
                    this.modalActiveIndex = 0;
                    this.quickViewActive = true;
                },
                insertIntoCart(unit, size) {
                    this.cart.push({ id: unit.id, title: unit.title, price: unit.price, image: unit.images[0], size: size });
                    this.quickViewActive = false;
                    this.cartOpen = true;
                },
                removeLineItem(idx) { this.cart.splice(idx, 1); },
                totalCalculation() { return this.cart.reduce((acc, item) => acc + item.price, 0); },
                toggleWishlist(unit) {
                    const idx = this.wishlist.findIndex(w => w.id === unit.id);
                    if (idx > -1) this.wishlist.splice(idx, 1);
                    else this.wishlist.push(unit);
                },
                isWishlisted(id) { return this.wishlist.some(w => w.id === id); },
                sendWhatsAppOrder(unit, size) {
                    window.open(`https://wa.me/919810198271?text=Order%20${encodeURIComponent(unit.title)}`, '_blank');
                },
                checkoutBulkWhatsApp() {
                    let message = "Hello Parampara, I would like to order the following items from the Lookbook Portfolio:\n\n";
                    this.cart.forEach((item, index) => {
                        message += `${index + 1}. ${item.title} (Size: ${item.size}) - ₹${item.price.toLocaleString('en-IN')}\n`;
                    });
                    message += `\nTotal Estimated: ₹${this.totalCalculation().toLocaleString('en-IN')}`;
                    window.open(`https://wa.me/919810198271?text=${encodeURIComponent(message)}`, '_blank');
                }
            }
        }
